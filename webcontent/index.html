<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red vs White Bet</title>
    <style>
        :root {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f6f8fb;
            color: #0f172a;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .container {
            width: min(100%, 420px);
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.15);
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 1.6rem;
        }

        .buttons {
            display: flex;
            gap: 1rem;
        }

        .buttons button {
            flex: 1;
            border: none;
            border-radius: 0.75rem;
            padding: 0.9rem 0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .buttons button:active {
            transform: translateY(1px);
        }

        .buttons button.red {
            background: linear-gradient(135deg, #ff4d4f, #d4380d);
            color: white;
        }

        .buttons button.white {
            background: linear-gradient(135deg, #f5f5f5, #cbd5f5);
            color: #0f172a;
        }

        .status {
            border-radius: 0.75rem;
            padding: 1rem;
            background: #eef2ff;
            font-size: 1.05rem;
            min-height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.win {
            background: #ecfccb;
            color: #166534;
        }

        .status.lose {
            background: #fee2e2;
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Red vs White Bet</h1>
        <p>Select the color you want to bet on. The server returns a random 0 (white) or 1 (red).</p>
        <div class="buttons">
            <button class="red" data-bet="1">Bet on Red</button>
            <button class="white" data-bet="0">Bet on White</button>
        </div>
        <div class="status" id="status">Choose a color to place your bet.</div>
    </div>

    <script>
        const statusEl = document.getElementById('status');

        async function placeBet(betValue) {
            statusEl.textContent = 'Waiting for result…';
            statusEl.className = 'status';
            try {
                const response = await fetch('bet', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: new URLSearchParams({ bet: betValue }),
                });

                if (!response.ok) {
                    throw new Error('Server error: ' + response.status);
                }

                const result = await response.json();
                const won = result.win;
                const color = result.color;

                statusEl.textContent = won
                    ? `Outcome: ${color} — You won!`
                    : `Outcome: ${color} — You lost.`;

                statusEl.classList.add(won ? 'win' : 'lose');
            } catch (err) {
                statusEl.textContent = 'Unable to reach the server.';
                statusEl.className = 'status';
                console.error(err);
            }
        }

        document.querySelectorAll('button[data-bet]').forEach((button) => {
            button.addEventListener('click', () => {
                placeBet(button.getAttribute('data-bet'));
            });
        });
    </script>
</body>
</html>
